<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a0a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a1f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="aGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8c14a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c8a020;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="32" cy="32" r="31" fill="url(#bgGrad)" stroke="#c8162c" stroke-width="2"/>

  <!-- Avengers "A" shape -->
  <!-- Left leg -->
  <polygon points="16,52 26,16 32,28 22,52" fill="url(#aGrad)"/>
  <!-- Right leg -->
  <polygon points="48,52 38,16 32,28 42,52" fill="url(#aGrad)"/>
  <!-- Top triangle / peak -->
  <polygon points="32,10 26,16 38,16" fill="url(#aGrad)"/>
  <!-- Crossbar -->
  <rect x="22" y="34" width="20" height="4" rx="1" fill="url(#aGrad)"/>
</svg>

