<nav class="nav" [class.scrolled]="scrolled()">
  <div class="nav-inner">
    <button class="nav-logo" (click)="scrollToTop()" aria-label="Go to top">
      <svg class="logo-icon" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="40" height="40" rx="4" fill="#e23636"/>
        <text x="20" y="24" text-anchor="middle" fill="white" font-size="12" font-weight="700" font-family="Arial, sans-serif" letter-spacing="0.5">MCU</text>
      </svg>
      <span class="logo-text">MARVEL CINEMATIC UNIVERSE</span>
    </button>

    <div class="nav-phases">
      @for (phase of phases; track phase; let i = $index) {
        <button
          class="phase-link"
          [class.active]="activePhase === phase"
          (click)="scrollToPhase(phase)"
        >{{ phaseNames[i] }}</button>
      }
    </div>

    <div class="nav-right">
      <button class="search-btn" (click)="openSearch.emit()" aria-label="Search">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
      </button>
      <button class="watched-pill" (click)="openJourney.emit()" aria-label="My Journey">
        <span class="pill-count">{{ progress.watchedCount() }} / 37</span>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
        </svg>
      </button>
    </div>
  </div>
</nav>

<div class="bottom-tab-bar">
  @for (phase of phases; track phase) {
    <button
      class="tab-dot"
      [class.active]="activePhase === phase"
      [style.--phase-color]="'var(--phase-' + phase + ')'"
      (click)="scrollToPhase(phase)"
      [attr.aria-label]="'Go to Phase ' + phase"
    ></button>
  }
  <div class="tab-right">
    <span class="tab-count">{{ progress.watchedCount() }}/37</span>
    <button class="tab-person" (click)="openJourney.emit()" aria-label="My Journey">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
      </svg>
    </button>
  </div>
</div>
